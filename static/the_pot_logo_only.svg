<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">The Pot - Logo</title>
  <desc id="desc">Logo vettoriale stilizzato con pianta, goccia e cerchio, senza scritta.</desc>

  <defs>
    <linearGradient id="gold" x1="256" y1="128" x2="768" y2="896" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F3E0A6"/>
      <stop offset="0.45" stop-color="#C9A75F"/>
      <stop offset="1" stop-color="#8D6A2E"/>
    </linearGradient>

    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .mark {
        fill: none;
        stroke: url(#gold);
        stroke-width: 20;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }
      .fine {
        fill: none;
        stroke: url(#gold);
        stroke-width: 14;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }
      .dot {
        fill: url(#gold);
      }
    </style>
  </defs>

  <!-- Transparent background -->

  <g filter="url(#softGlow)">
    <!-- Outer broken circle -->
    <path class="fine" d="M338 736
                          A300 300 0 1 1 686 736" />
    <path class="fine" d="M308 628
                          A300 300 0 0 1 308 396" />
    <path class="fine" d="M716 396
                          A300 300 0 0 1 716 628" />

    <!-- Vertical axis -->
    <path class="fine" d="M512 246 L512 782" />

    <!-- Upper water/drop flame -->
    <path class="mark" d="M512 320
                           C462 380 462 436 512 474
                           C562 436 562 380 512 320 Z" />

    <!-- Stem -->
    <path class="mark" d="M512 474 L512 735" />

    <!-- Upper leaves -->
    <path class="mark" d="M512 505
                           C458 470 398 470 350 530
                           C416 546 469 538 512 505 Z" />
    <path class="mark" d="M512 505
                           C566 470 626 470 674 530
                           C608 546 555 538 512 505 Z" />

    <!-- Lower leaves -->
    <path class="mark" d="M512 600
                           C452 565 383 568 326 634
                           C399 653 462 642 512 600 Z" />
    <path class="mark" d="M512 600
                           C572 565 641 568 698 634
                           C625 653 562 642 512 600 Z" />

    <!-- Axis dots -->
    <circle class="dot" cx="512" cy="184" r="13"/>
    <circle class="dot" cx="512" cy="224" r="8"/>
    <circle class="dot" cx="512" cy="258" r="6"/>
    <circle class="dot" cx="512" cy="792" r="12"/>
  </g>
</svg>
