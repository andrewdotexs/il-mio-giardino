<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#5a8a4a"/>
      <stop offset="60%" stop-color="#3d6830"/>
      <stop offset="100%" stop-color="#2a4d20"/>
    </radialGradient>

    <!-- Pot body gradient (3D cylinder) -->
    <linearGradient id="potBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c47a42"/>
      <stop offset="18%" stop-color="#d99860"/>
      <stop offset="40%" stop-color="#c8854e"/>
      <stop offset="65%" stop-color="#b06a38"/>
      <stop offset="85%" stop-color="#8f5228"/>
      <stop offset="100%" stop-color="#7a4420"/>
    </linearGradient>

    <!-- Pot rim gradient -->
    <linearGradient id="potRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dda872"/>
      <stop offset="40%" stop-color="#c8854e"/>
      <stop offset="100%" stop-color="#a06838"/>
    </linearGradient>

    <!-- Soil gradient -->
    <radialGradient id="soil" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#6e4a2a"/>
      <stop offset="70%" stop-color="#553818"/>
      <stop offset="100%" stop-color="#3d2810"/>
    </radialGradient>

    <!-- Stem gradient -->
    <linearGradient id="stem" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a9a3a"/>
      <stop offset="35%" stop-color="#72b84e"/>
      <stop offset="65%" stop-color="#4a8530"/>
      <stop offset="100%" stop-color="#3a6a25"/>
    </linearGradient>

    <!-- Leaf gradients -->
    <linearGradient id="leafDarkL" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#5aaa3a"/>
      <stop offset="50%" stop-color="#3d8528"/>
      <stop offset="100%" stop-color="#2d6a1a"/>
    </linearGradient>
    <linearGradient id="leafDarkR" x1="0.8" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#55a235"/>
      <stop offset="50%" stop-color="#3a8025"/>
      <stop offset="100%" stop-color="#2a6518"/>
    </linearGradient>
    <linearGradient id="leafMidL" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#68c044"/>
      <stop offset="50%" stop-color="#4da832"/>
      <stop offset="100%" stop-color="#3a8a25"/>
    </linearGradient>
    <linearGradient id="leafMidR" x1="0.8" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#62b840"/>
      <stop offset="50%" stop-color="#48a02e"/>
      <stop offset="100%" stop-color="#358522"/>
    </linearGradient>
    <linearGradient id="leafBright" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#78d050"/>
      <stop offset="45%" stop-color="#5ab838"/>
      <stop offset="100%" stop-color="#42a028"/>
    </linearGradient>

    <!-- Water drop gradient -->
    <radialGradient id="drop" cx="38%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#e8f5ff"/>
      <stop offset="40%" stop-color="#a0d8f0"/>
      <stop offset="100%" stop-color="#60b0d8"/>
    </radialGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-5%" width="125%" height="120%">
      <feDropShadow dx="2" dy="5" stdDeviation="6" flood-color="#1a2a10" flood-opacity="0.4"/>
    </filter>
    <filter id="softShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1a3010" flood-opacity="0.35"/>
    </filter>
    <filter id="dropShadow" x="-30%" y="-20%" width="170%" height="160%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1.5" flood-color="#204018" flood-opacity="0.4"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="-3"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.08"/>
      <feComposite operator="in" in2="blur"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>

    <!-- Rounded rect clip -->
    <clipPath id="roundClip">
      <rect x="10" y="10" width="492" height="492" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <!-- Clipped group -->
  <g clip-path="url(#roundClip)">

    <!-- Background -->
    <rect x="10" y="10" width="492" height="492" rx="100" fill="url(#bg)"/>
    <!-- Subtle light overlay -->
    <ellipse cx="200" cy="160" rx="280" ry="220" fill="url(#bg)" opacity="0.15"
             style="filter:url(#innerGlow)"/>
    <ellipse cx="180" cy="120" rx="200" ry="180" fill="#ffffff" opacity="0.04"/>

    <!-- ══════ POT ══════ -->
    <g filter="url(#shadow)">
      <!-- Pot body (trapezoid path) -->
      <path d="M152,300 L360,300 L340,430 Q338,440 330,442 L182,442 Q174,440 172,430 Z"
            fill="url(#potBody)" stroke="#8a5228" stroke-width="0.5"/>

      <!-- Pot surface highlight (curved) -->
      <path d="M175,310 Q256,305 345,310 L338,420 Q256,416 178,420 Z"
            fill="white" opacity="0.06"/>

      <!-- Left highlight strip -->
      <path d="M162,310 L175,310 L178,425 L172,425 Z" fill="white" opacity="0.08" rx="2"/>

      <!-- Pot rim -->
      <ellipse cx="256" cy="300" rx="112" ry="20" fill="url(#potRim)"
               stroke="#a06838" stroke-width="0.8"/>
      <!-- Rim top shine -->
      <ellipse cx="248" cy="295" rx="90" ry="10" fill="white" opacity="0.15"/>
      <ellipse cx="240" cy="293" rx="60" ry="5" fill="white" opacity="0.1"/>

      <!-- Pot bottom ellipse -->
      <ellipse cx="256" cy="441" rx="80" ry="10" fill="#6a3a18" opacity="0.6"/>
    </g>

    <!-- Soil surface -->
    <ellipse cx="256" cy="302" rx="100" ry="16" fill="url(#soil)"/>
    <ellipse cx="250" cy="300" rx="80" ry="10" fill="#7a5430" opacity="0.5"/>
    <!-- Soil crumbs -->
    <g opacity="0.6">
      <circle cx="220" cy="302" r="2" fill="#4a2e14"/>
      <circle cx="245" cy="305" r="1.5" fill="#5a3a1a"/>
      <circle cx="270" cy="301" r="2.2" fill="#4a2e14"/>
      <circle cx="290" cy="304" r="1.8" fill="#3d2510"/>
      <circle cx="205" cy="305" r="1.5" fill="#5a3a1a"/>
      <circle cx="310" cy="303" r="1.7" fill="#4a2e14"/>
      <circle cx="235" cy="308" r="1.3" fill="#3d2510"/>
      <circle cx="280" cy="307" r="1.6" fill="#5a3a1a"/>
    </g>

    <!-- ══════ STEM ══════ -->
    <path d="M255,302 Q254,260 256,220 Q257,180 260,140 Q261,110 259,85"
          fill="none" stroke="#3a6a25" stroke-width="7" stroke-linecap="round" opacity="0.4"/>
    <path d="M254,302 Q253,260 255,220 Q256,180 259,140 Q260,110 258,85"
          fill="none" stroke="url(#stem)" stroke-width="5.5" stroke-linecap="round"/>
    <!-- Stem highlight -->
    <path d="M252,300 Q251,258 253,218 Q254,178 257,140 Q258,112 256,88"
          fill="none" stroke="#80c858" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- ══════ LEAVES ══════ -->

    <!-- Back left leaf (darkest, largest) -->
    <g filter="url(#softShadow)">
      <path d="M252,250 Q210,210 185,170 Q178,156 182,145
               Q186,134 198,138 Q220,148 248,195 Q260,218 254,248 Z"
            fill="url(#leafDarkL)"/>
      <!-- Vein -->
      <path d="M253,248 Q220,200 192,152" fill="none" stroke="#2a5a18" stroke-width="1.2" opacity="0.6"/>
      <path d="M235,215 Q222,222 210,218" fill="none" stroke="#2a5a18" stroke-width="0.7" opacity="0.4"/>
      <path d="M242,200 Q228,195 218,200" fill="none" stroke="#2a5a18" stroke-width="0.7" opacity="0.4"/>
      <path d="M225,228 Q215,238 205,233" fill="none" stroke="#2a5a18" stroke-width="0.6" opacity="0.35"/>
    </g>

    <!-- Back right leaf -->
    <g filter="url(#softShadow)">
      <path d="M260,240 Q298,195 325,162 Q335,150 340,152
               Q348,156 342,168 Q328,195 280,228 Q265,238 260,240 Z"
            fill="url(#leafDarkR)"/>
      <path d="M260,238 Q300,198 335,160" fill="none" stroke="#285518" stroke-width="1.1" opacity="0.55"/>
      <path d="M285,218 Q296,210 308,215" fill="none" stroke="#285518" stroke-width="0.7" opacity="0.4"/>
      <path d="M275,228 Q288,225 298,228" fill="none" stroke="#285518" stroke-width="0.6" opacity="0.35"/>
    </g>

    <!-- Middle left leaf -->
    <g filter="url(#softShadow)">
      <path d="M254,215 Q222,178 205,142 Q198,126 204,118
               Q210,112 218,118 Q236,135 252,178 Q258,198 255,214 Z"
            fill="url(#leafMidL)"/>
      <path d="M254,212 Q228,170 210,128" fill="none" stroke="#2d6018" stroke-width="1.1" opacity="0.5"/>
      <path d="M238,182 Q226,180 218,186" fill="none" stroke="#2d6018" stroke-width="0.7" opacity="0.4"/>
      <path d="M245,168 Q234,162 225,168" fill="none" stroke="#2d6018" stroke-width="0.6" opacity="0.35"/>
      <path d="M233,195 Q224,198 216,194" fill="none" stroke="#2d6018" stroke-width="0.6" opacity="0.3"/>
    </g>

    <!-- Middle right leaf -->
    <g filter="url(#softShadow)">
      <path d="M260,205 Q290,168 310,135 Q318,122 324,124
               Q332,128 326,140 Q312,165 272,198 Q264,205 260,206 Z"
            fill="url(#leafMidR)"/>
      <path d="M261,203 Q292,168 318,132" fill="none" stroke="#2a5a15" stroke-width="1" opacity="0.5"/>
      <path d="M282,180 Q292,175 302,180" fill="none" stroke="#2a5a15" stroke-width="0.6" opacity="0.4"/>
      <path d="M275,190 Q285,188 294,192" fill="none" stroke="#2a5a15" stroke-width="0.6" opacity="0.35"/>
    </g>

    <!-- Top left sprout -->
    <g filter="url(#softShadow)">
      <path d="M257,145 Q240,118 234,98 Q230,86 236,82
               Q242,80 246,88 Q252,105 256,135 Z"
            fill="url(#leafBright)"/>
      <path d="M256,140 Q244,112 236,90" fill="none" stroke="#3a7a22" stroke-width="0.9" opacity="0.5"/>
    </g>

    <!-- Top right sprout (smallest, brightest) -->
    <g filter="url(#softShadow)">
      <path d="M259,130 Q272,105 280,88 Q285,78 282,74
               Q278,72 274,78 Q264,95 258,122 Z"
            fill="url(#leafBright)"/>
      <path d="M258,126 Q272,100 280,82" fill="none" stroke="#3a7a22" stroke-width="0.8" opacity="0.45"/>
    </g>

    <!-- ══════ WATER DROPS ══════ -->
    <!-- Drop on right leaf -->
    <g filter="url(#dropShadow)">
      <ellipse cx="298" cy="190" rx="7" ry="8" fill="url(#drop)" opacity="0.85"/>
      <ellipse cx="295" cy="187" rx="3" ry="3.5" fill="white" opacity="0.7"/>
      <ellipse cx="296" cy="185" rx="1.5" ry="1.2" fill="white" opacity="0.9"/>
    </g>
    <!-- Smaller drop on left -->
    <g filter="url(#dropShadow)">
      <ellipse cx="222" cy="210" rx="5" ry="5.5" fill="url(#drop)" opacity="0.75"/>
      <ellipse cx="220" cy="208" rx="2" ry="2.5" fill="white" opacity="0.65"/>
    </g>
    <!-- Tiny drop on stem -->
    <g>
      <ellipse cx="252" cy="265" rx="3.5" ry="4" fill="url(#drop)" opacity="0.65"/>
      <ellipse cx="251" cy="263.5" rx="1.5" ry="1.5" fill="white" opacity="0.55"/>
    </g>

  </g>

  <!-- Outer rounded border -->
  <rect x="10" y="10" width="492" height="492" rx="100" ry="100"
        fill="none" stroke="#2a4d20" stroke-width="2" opacity="0.3"/>
</svg>
