<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">The Pot - Web App Icon</title>
  <desc id="desc">Icona SVG per web app con sfondo scuro, bordi arrotondati e logo botanico dorato.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050604"/>
      <stop offset="0.55" stop-color="#0B0D08"/>
      <stop offset="1" stop-color="#010201"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="50%" cy="43%" r="58%">
      <stop offset="0" stop-color="#1D2115" stop-opacity="0.55"/>
      <stop offset="0.62" stop-color="#0B0D08" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gold" x1="160" y1="88" x2="352" y2="424" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8E7B2"/>
      <stop offset="0.18" stop-color="#E0C071"/>
      <stop offset="0.48" stop-color="#B98B3E"/>
      <stop offset="0.72" stop-color="#E7C77B"/>
      <stop offset="1" stop-color="#8E6428"/>
    </linearGradient>

    <filter id="logoShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.65"/>
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#D4AF62" flood-opacity="0.32"/>
    </filter>

    <filter id="innerTexture" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="
        0 0 0 0 0.65
        0 0 0 0 0.52
        0 0 0 0 0.28
        0 0 0 .18 0" result="goldNoise"/>
      <feComposite in="goldNoise" in2="SourceGraphic" operator="in" result="texture"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="texture"/>
      </feMerge>
    </filter>

    <style>
      .stroke {
        fill: none;
        stroke: url(#gold);
        stroke-width: 13;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .stroke-thin {
        fill: none;
        stroke: url(#gold);
        stroke-width: 10;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .dot {
        fill: url(#gold);
      }
    </style>
  </defs>

  <rect x="8" y="8" width="496" height="496" rx="104" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="104" fill="url(#bgGlow)"/>
  <rect x="10" y="10" width="492" height="492" rx="101" fill="none" stroke="#2B281E" stroke-width="2" opacity="0.55"/>

  <g opacity="0.08">
    <path d="M0 86 C120 54 210 130 329 77 C420 36 485 52 512 31 L512 0 L0 0 Z" fill="#ffffff"/>
    <path d="M0 435 C119 468 199 389 322 437 C411 472 475 462 512 485 L512 512 L0 512 Z" fill="#ffffff"/>
  </g>

  <g transform="translate(0,2)" filter="url(#logoShadow)">
    <g filter="url(#innerTexture)">
      <path class="stroke-thin" d="M164 366 A158 158 0 1 1 348 366"/>
      <path class="stroke-thin" d="M151 311 A158 158 0 0 1 151 201"/>
      <path class="stroke-thin" d="M361 201 A158 158 0 0 1 361 311"/>

      <path class="stroke-thin" d="M256 115 L256 398"/>

      <path class="stroke" d="M256 153
                              C231 184 231 212 256 233
                              C281 212 281 184 256 153 Z"/>

      <path class="stroke" d="M256 233 L256 362"/>

      <path class="stroke" d="M256 250
                              C226 231 192 233 168 263
                              C205 272 235 267 256 250 Z"/>
      <path class="stroke" d="M256 250
                              C286 231 320 233 344 263
                              C307 272 277 267 256 250 Z"/>
      <path class="stroke" d="M256 299
                              C223 279 184 282 154 316
                              C195 327 230 321 256 299 Z"/>
      <path class="stroke" d="M256 299
                              C289 279 328 282 358 316
                              C317 327 282 321 256 299 Z"/>

      <circle class="dot" cx="256" cy="75" r="8"/>
      <circle class="dot" cx="256" cy="96" r="5"/>
      <circle class="dot" cx="256" cy="113" r="7"/>
      <circle class="dot" cx="256" cy="410" r="8"/>
    </g>
  </g>
</svg>
