# ── GitHub Actions: pubblicazione automatica immagine Docker ─────────
#
# Questo workflow viene eseguito ogni volta che fai un push sul branch
# master. Costruisce l'immagine Docker usando il Dockerfile del repository
# e la pubblica su GitHub Container Registry (ghcr.io), così il tuo amico
# (o chiunque altro) può scaricarla con "docker pull" senza dover clonare
# il codice e costruirla da sé.
#
# Posiziona questo file in: .github/workflows/docker-publish.yml
# (la cartella .github/workflows è obbligatoria, GitHub la riconosce
# automaticamente)

name: Pubblica immagine Docker

# Trigger: quando deve girare il workflow
on:
  # Ad ogni push sul branch master
  push:
    branches: [master]
  # Permette anche di lanciarlo manualmente dall'interfaccia GitHub
  # (utile per ripubblicare l'immagine senza fare un commit fittizio)
  workflow_dispatch:

# Variabili d'ambiente disponibili a tutti i job
env:
  REGISTRY: ghcr.io
  # IMAGE_NAME viene calcolato dinamicamente come "tuo-username/nome-repo"
  # in minuscolo, perché ghcr.io richiede minuscole.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Permessi necessari: il workflow deve poter scrivere sul registry
    # (per pubblicare l'immagine) e leggere il codice (per costruirla).
    permissions:
      contents: read
      packages: write

    steps:
      # Step 1: scarica il codice del repository nel runner GitHub.
      # Senza questo step il runner sarebbe vuoto e non potrebbe leggere
      # il Dockerfile.
      - name: Checkout del repository
        uses: actions/checkout@v4

      # Step 2: configura buildx, il motore di build moderno di Docker.
      # Permette build multi-piattaforma e altre funzioni avanzate, ed è
      # raccomandato anche per build semplici come la nostra.
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: login sul registry ghcr.io.
      # Usa il GITHUB_TOKEN automatico (non devi configurare nulla, viene
      # generato da GitHub per ogni run del workflow). Il token ha i
      # permessi specificati sopra (packages: write).
      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: estrai metadati per i tag dell'immagine.
      # Genera automaticamente diversi tag per la stessa immagine:
      #   - "latest" (sempre l'ultima versione su master)
      #   - SHA del commit (es. "sha-a1b2c3d") per riferimento preciso
      # Così chi scarica può scegliere se vuole l'ultimo (latest) o una
      # versione specifica per riproducibilità.
      - name: Estrai metadati Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # Step 5: costruisci e pubblica l'immagine.
      # Usa il Dockerfile nella radice del repo (default), pubblica su
      # ghcr.io con i tag generati al passo precedente.
      # cache-from e cache-to abilitano il caching dei layer Docker tra
      # build successive, riducendo i tempi quando modifichi solo file
      # piccoli (HTML, server.py) senza toccare il Dockerfile.
      - name: Build e push immagine
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
